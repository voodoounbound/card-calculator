<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Card Calculator</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 500px;
            margin: 40px auto;
            padding: 20px;
        }

        label {
            display: block;
            margin-top: 15px;
        }

        input, select, button {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
        }

        button {
            margin-top: 20px;
            cursor: pointer;
        }

        #result {
            margin-top: 25px;
            font-size: 24px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>Card Calculator</h1>

    <label>Current Level</label>
    <input type="number" id="currentLevel">

    <label>Category</label>
    <select id="category">
        <option>Legendary</option>
        <option>Epic</option>
        <option>Rare</option>
        <option>Common</option>
    </select>

    <label>Desired Level</label>
    <input type="number" id="desiredLevel">

    <button onclick="calculate()">Calculate</button>

    <div id="result"></div>

    <script>

        const cardRequirements = {

            Legendary: {
                2: 1,
                3: 1,
                4: 2,
                5: 2
            },

            Epic: {
                2: 2,
                3: 4,
                4: 6,
                5: 8
            },

            Rare: {
                2: 4,
                3: 8,
                4: 12,
                5: 20
            },

            Common: {
                2: 8,
                3: 20,
                4: 30,
                5: 50
            }

        };

        function calculate() {

            const current = Number(document.getElementById("currentLevel").value);
            const desired = Number(document.getElementById("desiredLevel").value);
            const category = document.getElementById("category").value;

            let total = 0;

            for (let level = current + 1; level <= desired; level++) {
                total += cardRequirements[category][level] || 0;
            }

            document.getElementById("result").textContent =
                "Cards Needed: " + total.toLocaleString();
        }

    </script>

</body>
</html>
