<style>
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    min-height: 100vh;
    background:
        radial-gradient(circle at top left, rgba(44, 42, 82, 0.55), transparent 35%),
        radial-gradient(circle at top right, rgba(8, 8, 18, 0.8), transparent 40%),
        linear-gradient(135deg, #10101d 0%, #060711 100%);
    color: #f4e7c5;
    font-family: 'Mendalion', sans-serif;
    padding: 18px;
}

.page {
    width: 100%;
    display: grid;
    grid-template-columns: 360px minmax(360px, 1fr);
    gap: 18px;
    align-items: start;
}

/* Calculator */
.calculator {
    width: 100%;
    min-height: calc(100vh - 36px);
    background: rgba(27, 27, 47, 0.95);
    border: 2px solid #d4af37;
    border-radius: 10px;
    padding: 18px 20px;
    box-shadow:
        0 0 8px rgba(212,175,55,.55),
        0 0 25px rgba(212,175,55,.14);
}

h1 {
    margin: 0 0 22px 0;
    text-align: center;
    color: #d4af37;
    font-family: 'Witches Magic', sans-serif;

    background: linear-gradient(
        135deg,
        #d4af37 0%,
        #f4d76b 45%,
        #b88a1f 100%
    );

    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;

    filter:
        drop-shadow(0 0 5px rgba(212,175,55,.75))
        drop-shadow(0 0 16px rgba(212,175,55,.35));

    animation: titleGlow 2.4s ease-in-out infinite;
}

.title-main {
    display: block;
    font-size: 3.6rem;
    line-height: 1.2;
    letter-spacing: 1px;
}
.subtitle {
    text-align: center;
    margin-top: 0;
    margin-bottom: 8px;
    color: #c8b98f;
    font-family: 'Mendalion', serif;
    font-size: 1.7rem;
    letter-spacing: .5px;
}

label {
    display: block;
    margin-top: 12px;
    margin-bottom: 5px;
    font-size: .95rem;
    font-weight: bold;
    color: #f4e7c5;
}

.field-wrap {
    position: relative;
}

input,
select {
    width: 100%;
    height: 30px;
    padding: 6px 30px 6px 8px;
    border-radius: 5px;
    border: 1px solid #d4af37;
    background: #252542;
    color: #f4e7c5;
    font-family: 'Mendalion', sans-serif;
    font-size: .85rem;
}

input:focus,
select:focus {
    outline: none;
    box-shadow:
        0 0 6px rgba(212,175,55,.75),
        0 0 16px rgba(212,175,55,.2);
}

.clear-field {
    position: absolute;
    top: 50%;
    right: 6px;
    transform: translateY(-50%);
    width: 18px;
    height: 18px;
    margin: 0;
    padding: 0;
    border: 1px solid rgba(212,175,55,.65);
    border-radius: 50%;
    background: rgba(15, 15, 26, 0.75);
    color: #d4af37;
    font-size: 13px;
    line-height: 14px;
    font-family: 'Mendalion', sans-serif;
    cursor: pointer;
    transition: .2s;
    z-index: 5;
}

.clear-field:hover {
    background: #d4af37;
    color: #111;
    box-shadow: 0 0 6px #d4af37;
}

/* Lower input layout */
.lower-fields {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 18px;
    margin-top: 4px;
}

.lower-fields .right-fields {
    border-left: 2px solid rgba(212,175,55,.65);
    padding-left: 18px;
}

/* Custom card autocomplete */
.autocomplete-menu {
    display: none;
    position: absolute;
    top: calc(100% + 5px);
    left: 0;
    right: 0;
    max-height: 230px;
    overflow-y: auto;
    background: rgba(15, 15, 26, 0.98);
    border: 1px solid #d4af37;
    border-radius: 8px;
    box-shadow:
        0 0 10px rgba(212,175,55,.45),
        0 0 25px rgba(212,175,55,.15);
    z-index: 50;
}

.autocomplete-menu.show {
    display: block;
}

.autocomplete-item {
    padding: 8px 10px;
    cursor: pointer;
    border-bottom: 1px solid rgba(212,175,55,.16);
    color: #f4e7c5;
    font-size: .82rem;
}

.autocomplete-item:hover,
.autocomplete-item.active {
    background: rgba(212,175,55,.22);
    color: #d4af37;
    box-shadow: inset 0 0 8px rgba(212,175,55,.18);
}
  
.autocomplete-rarity {
    display: block;
    margin-top: 2px;
    color: #c8b98f;
    font-size: .8rem;
}

.autocomplete-empty {
    padding: 8px 10px;
    color: #c8b98f;
    font-style: italic;
    font-size: .8rem;
}

.calculate-button {
    width: 100%;
    margin-top: 20px;
    padding: 9px;
    border: none;
    border-radius: 5px;
    cursor: pointer;

    background: linear-gradient(
        135deg,
        #d4af37 0%,
        #f4d76b 45%,
        #b88a1f 100%
    );

    color: #111;
    transition: .25s;
    font-family: 'Mendalion', sans-serif;
    font-size: 1.45rem;
    letter-spacing: .5px;

    box-shadow:
        0 0 8px rgba(212,175,55,.65),
        0 0 18px rgba(212,175,55,.35);

    animation: buttonGlow 2.4s ease-in-out infinite;
    position: relative;
    overflow: hidden;
}

.calculate-button:hover {
    transform: scale(1.025);

    box-shadow:
        0 0 12px #d4af37,
        0 0 28px rgba(212,175,55,.85),
        0 0 48px rgba(212,175,55,.45);
}
  .calculate-button:active {
    transform: scale(0.98);
}

#result {
    margin-top: 22px;
    text-align: center;
    font-size: 1.35rem;
    font-weight: bold;
    color: #d4af37;
    min-height: 62px;
    text-shadow: 0 0 10px rgba(212,175,55,.45);
}

.result-detail {
    display: block;
    margin-top: 8px;
    font-size: .95rem;
    color: #f4e7c5;
    font-weight: normal;
    line-height: 1.35;
}

.footer {
    margin-top: 34px;
    text-align: center;
    font-size: 1.2rem;
    color: #9f9270;
    font-family: 'Witches Magic', sans-serif;
}

/* Summary Panel */
.summary-panel {
    width: 100%;
    min-height: 94px;
    max-height: calc(100vh - 36px);
    overflow-y: auto;
    background: rgba(15, 15, 26, 0.96);
    border: 2px solid #d4af37;
    border-radius: 9px;
    padding: 10px;
    box-shadow:

.summary-panel h2 {

}

.summary-empty {
    text-align: center;
    color: #c8b98f;

    font-size: .8rem;

}

.card-group {
    margin-top: 12px;
    padding-top: 8px;
    border-top: 1px solid rgba(212,175,55,.35);
}

.card-group-title {
    font-family: 'Mendalion', sans-serif;
    color: #d4af37;
    font-size: 1.25rem;
    margin-bottom: 7px;
}

/* Horizontal calculation history row */
.summary-history-row {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding-bottom: 6px;
    border: 1px solid rgba(212,175,55,.45);
    border-radius: 7px;
    background: rgba(37, 37, 66, 0.65);
    padding: 8px;
}

/* Each historical calculation card */
.summary-card {
    flex: 0 0 120px;
    min-width: 120px;
    padding: 6px 7px;
    border-right: 1px solid rgba(212,175,55,.35);
    font-size: .8rem;
    line-height: 1.22;
}

.summary-card:last-child {
    border-right: none;
}

.summary-card strong {
    color: #d4af37;
}

.summary-final {
    font-size: .8rem;
    color: #d4af37;
    font-weight: bold;
    margin-bottom: 3px;
}

.summary-meta {
    color: #f4e7c5;
    margin-bottom: 2px;
}

.summary-deductions {
    color: #c8b98f;
    font-size: .8rem;
    margin-top: 3px;
}

.clear-button {
    width: 100%;
    background: transparent;
    color: #d4af37;
    border: 1px solid #d4af37;
    margin-top: 6px;
    padding: 5px;
    font-size: 1.05rem;
    border-radius: 4px;
    cursor: pointer;
    font-family: 'Mendalion', sans-serif;
}

.clear-button:hover {
    background: rgba(212,175,55,.12);
}
@keyframes buttonGlow {
    0% {
        box-shadow:
            0 0 6px rgba(212,175,55,.45),
            0 0 14px rgba(212,175,55,.25);
    }

    50% {
        box-shadow:
            0 0 12px rgba(212,175,55,.9),
            0 0 30px rgba(212,175,55,.55),
            0 0 48px rgba(212,175,55,.25);
    }

    100% {
        box-shadow:
            0 0 6px rgba(212,175,55,.45),
            0 0 14px rgba(212,175,55,.25);
    }
}
  .calculate-button::before {
    content: "";
    position: absolute;
    top: 0;
    left: -75%;
    width: 50%;
    height: 100%;

    background: linear-gradient(
        120deg,
        transparent,
        rgba(255,255,255,.45),
        transparent
    );

    transform: skewX(-20deg);
    animation: buttonShine 3.2s ease-in-out infinite;
}
  @keyframes buttonShine {
    0% {
        left: -75%;
    }

    45% {
        left: 125%;
    }

    100% {
        left: 125%;
    }
}
@keyframes titleGlow {
    0% {
        filter:
            drop-shadow(0 0 4px rgba(212,175,55,.45))
            drop-shadow(0 0 10px rgba(212,175,55,.25));
    }

    50% {
        filter:
            drop-shadow(0 0 8px rgba(212,175,55,.95))
            drop-shadow(0 0 20px rgba(212,175,55,.65))
            drop-shadow(0 0 34px rgba(212,175,55,.35));
    }

    100% {
        filter:
            drop-shadow(0 0 4px rgba(212,175,55,.45))
            drop-shadow(0 0 10px rgba(212,175,55,.25));
    }

@media (max-width: 850px) {
    body {
        padding: 14px;
    }

    .page {
        grid-template-columns: 1fr;
    }

    .calculator {
        min-height: auto;
    }

    .summary-panel {
        max-height: none;
    }
}

@media (max-width: 430px) {
    .lower-fields {
        grid-template-columns: 1fr;
        gap: 0;
    }

    .lower-fields .right-fields {
        border-left: none;
        padding-left: 0;
    }

    .title-main {
        font-size: 3.25rem;
    }
}

let calculationHistory = [];
let activeSuggestionIndex = -1;
let currentCardSuggestions = [];
  
function getAllowedRarities(selectedRarity) {
    if (selectedRarity === "Legendary") {
        return ["Legendary", "Mythic", "Dark"];
    }

    if (selectedRarity) {
        return [selectedRarity];
    }

    return [];
}

function getFilteredCards() {
    const selectedRarity = document.getElementById("category").value;
    const allowedRarities = getAllowedRarities(selectedRarity);
    const searchTerm = document.getElementById("cardName").value.trim().toLowerCase();

    return Object.keys(cardRarities)
        .filter(card => {
            const rarityMatches =
                allowedRarities.length === 0 ||
                allowedRarities.includes(cardRarities[card]);

            const searchMatches =
                searchTerm === "" ||
                card.toLowerCase().includes(searchTerm);

            return rarityMatches && searchMatches;
        })
        .sort();
}

function renderCardSuggestions() {
    const menu = document.getElementById("cardSuggestions");
    const filteredCards = getFilteredCards();

    currentCardSuggestions = filteredCards;
    activeSuggestionIndex = -1;

    menu.innerHTML = "";

    if (filteredCards.length === 0) {
        const empty = document.createElement("div");
        empty.className = "autocomplete-empty";
        empty.textContent = "No matching cards found.";
        menu.appendChild(empty);
        menu.classList.add("show");
        return;
    }

    filteredCards.forEach((card, index) => {
        const item = document.createElement("div");
        item.className = "autocomplete-item";
        item.dataset.index = index;

        const name = document.createElement("div");
        name.textContent = card;

        const rarity = document.createElement("span");
        rarity.className = "autocomplete-rarity";
        rarity.textContent = cardRarities[card];

        item.appendChild(name);
        item.appendChild(rarity);

        item.addEventListener("mousedown", function(event) {
            event.preventDefault();
            chooseCard(card);
        });

        menu.appendChild(item);
    });

    menu.classList.add("show");
}

function hideCardSuggestions() {
    document.getElementById("cardSuggestions").classList.remove("show");
    activeSuggestionIndex = -1;
}

function setActiveSuggestion(index) {
    const items = document.querySelectorAll("#cardSuggestions .autocomplete-item");

    if (items.length === 0) {
        activeSuggestionIndex = -1;
        return;
    }

    if (index < 0) {
        index = items.length - 1;
    }

    if (index >= items.length) {
        index = 0;
    }

    items.forEach(item => item.classList.remove("active"));

    activeSuggestionIndex = index;
    items[activeSuggestionIndex].classList.add("active");
    items[activeSuggestionIndex].scrollIntoView({
        block: "nearest"
    });
}

function formIsReadyForCalculation() {
    const cardName = document.getElementById("cardName").value.trim();
    const category = document.getElementById("category").value;
    const currentLevel = document.getElementById("currentLevel").value;
    const desiredLevel = document.getElementById("desiredLevel").value;

    return (
        cardName !== "" &&
        cardRarities[cardName] &&
        category !== "" &&
        currentLevel !== "" &&
        desiredLevel !== ""
    );
}

function chooseCard(card) {
    document.getElementById("cardName").value = card;
    autoFillRarity();
    hideCardSuggestions();
}

function clearField(fieldId) {
    const field = document.getElementById(fieldId);
    field.value = "";
    field.focus();

    if (fieldId === "cardName") {
        document.getElementById("category").value = "";
        document.getElementById("currentLevel").value = "";
        renderCardSuggestions();
        return;
    }

    if (fieldId === "category") {
        document.getElementById("currentLevel").value = "";
        renderCardSuggestions();
        return;
    }
}

function autoFillRarity() {
    const cardName = document.getElementById("cardName").value.trim();
    const category = document.getElementById("category");

    if (cardRarities[cardName]) {
        category.value = cardRarities[cardName];
        autoFillCurrentLevel();
    }
}

function filterCardsByRarity() {
    const cardInput = document.getElementById("cardName");
    const selectedRarity = document.getElementById("category").value;
    const selectedCard = cardInput.value.trim();

    autoFillCurrentLevel();

    if (selectedCard && cardRarities[selectedCard]) {
        const allowedRarities = getAllowedRarities(selectedRarity);

        if (
            allowedRarities.length > 0 &&
            !allowedRarities.includes(cardRarities[selectedCard])
        ) {
            cardInput.value = "";
        }
    }

    renderCardSuggestions();
}

function getStartingLevel(displayCategory) {
    if (
        displayCategory === "Legendary" ||
        displayCategory === "Mythic" ||
        displayCategory === "Dark"
    ) {
        return 9;
    }

    if (displayCategory === "Epic") {
        return 6;
    }

    if (displayCategory === "Rare") {
        return 3;
    }

    if (displayCategory === "Common") {
        return 1;
    }

    return "";
}

function autoFillCurrentLevel() {
    const displayCategory = document.getElementById("category").value;
    const currentLevel = document.getElementById("currentLevel");

    const startingLevel = getStartingLevel(displayCategory);

    if (startingLevel !== "") {
        currentLevel.value = startingLevel;
    }
}
function getCalculationCategory(displayCategory) {
    if (displayCategory === "Mythic" || displayCategory === "Dark") {
        return "Legendary";
    }

    return displayCategory;
}  
function calculateCards() {
    const cardName = document.getElementById("cardName").value.trim();
    const current = Number(document.getElementById("currentLevel").value);
    const desired = Number(document.getElementById("desiredLevel").value);
    const displayCategory = document.getElementById("category").value;
    const category = getCalculationCategory(displayCategory);

    const ownedCards = Number(document.getElementById("ownedCards").value) || 0;
    const tradeTokens = Number(document.getElementById("tradeTokens").value) || 0;
    const wildCards = Number(document.getElementById("wildCards").value) || 0;

    const result = document.getElementById("result");

    if (!cardName) {
        result.textContent = "Choose or type a card name.";
        return;
    }

    if (!cardRarities[cardName]) {
        result.textContent = "Select a card from the suggested list.";
        return;
    }

    if (!displayCategory) {
        result.textContent = "Select a rarity.";
        return;
    }

    if (!current || !desired) {
        result.textContent = "Enter both levels.";
        return;
    }

    if (current < 1 || current > 18 || desired < 1 || desired > 18) {
        result.textContent = "Levels must be between 1 and 18.";
        return;
    }

    if (desired <= current) {
        result.textContent = "Desired level must be higher.";
        return;
    }

    let baseNeed = 0;

    for (let level = current + 1; level <= desired; level++) {
        baseNeed += cards[category][level] || 0;
    }

    const deductions = ownedCards + tradeTokens + wildCards;
    const finalNeed = Math.max(baseNeed - deductions, 0);

    let deductionDetails = "";

    if (ownedCards > 0) {
        deductionDetails += `Owned: ${ownedCards.toLocaleString()} `;
    }

    if (tradeTokens > 0) {
        deductionDetails += `Trade Tokens: ${tradeTokens.toLocaleString()} `;
    }

    if (wildCards > 0) {
        deductionDetails += `Wild Cards: ${wildCards.toLocaleString()} `;
    }

    result.innerHTML = `
        ✨ ${finalNeed.toLocaleString()} Cards Needed ✨
        <span class="result-detail">
            ${cardName}<br>
            Rarity: ${displayCategory}<br>
            Base Need: ${baseNeed.toLocaleString()}
            ${deductions > 0 ? `<br>${deductionDetails}<br>Total Deducted: ${deductions.toLocaleString()}` : ""}
        </span>
    `;

    addToSummary({
        cardName,
        current,
        desired,
        category: displayCategory,
        baseNeed,
        ownedCards,
        tradeTokens,
        wildCards,
        deductions,
        finalNeed,
        timestamp: Date.now()
    });
}

function addToSummary(entry) {
    calculationHistory.unshift(entry);
    renderSummary();
}

function renderSummary() {
    const summaryList = document.getElementById("summaryList");

    if (calculationHistory.length === 0) {
        summaryList.className = "summary-empty";
        summaryList.textContent = "No calculations yet.";
        return;
    }

    summaryList.className = "";

    const groupedByCard = {};

    calculationHistory.forEach(item => {
        if (!groupedByCard[item.cardName]) {
            groupedByCard[item.cardName] = [];
        }

        groupedByCard[item.cardName].push(item);
    });

    const sortedCardGroups = Object.entries(groupedByCard).sort((a, b) => {
        const latestA = Math.max(...a[1].map(item => item.timestamp));
        const latestB = Math.max(...b[1].map(item => item.timestamp));
        return latestB - latestA;
    });

    summaryList.innerHTML = sortedCardGroups.map(([cardName, entries]) => {
        entries.sort((a, b) => b.timestamp - a.timestamp);

        const cardsHtml = entries.map((item, index) => {
            let deductionLines = "";

            if (item.ownedCards > 0) {
                deductionLines += `<div><strong>Owned:</strong> ${item.ownedCards.toLocaleString()}</div>`;
            }

            if (item.tradeTokens > 0) {
                deductionLines += `<div><strong>Trade:</strong> ${item.tradeTokens.toLocaleString()}</div>`;
            }

            if (item.wildCards > 0) {
                deductionLines += `<div><strong>Wild:</strong> ${item.wildCards.toLocaleString()}</div>`;
            }

            if (item.deductions > 0) {
                deductionLines += `<div><strong>Deducted:</strong> ${item.deductions.toLocaleString()}</div>`;
            }

            return `
                <div class="summary-card">
                    <div class="summary-final">
                        ${index === 0 ? "Latest: " : ""}${item.finalNeed.toLocaleString()} Needed
                    </div>

                    <div class="summary-meta">
                        ${item.category} | Lvl ${item.current} → ${item.desired}
                    </div>

                    <div>
                        <strong>Base:</strong> ${item.baseNeed.toLocaleString()}
                    </div>

                    ${deductionLines ? `
                        <div class="summary-deductions">
                            ${deductionLines}
                        </div>
                    ` : ""}
                </div>
            `;
        }).join("");

        return `
            <div class="card-group">
                <div class="card-group-title">${cardName}</div>
                <div class="summary-history-row">
                    ${cardsHtml}
                </div>
            </div>
        `;
    }).join("");
}

function clearSummary() {
    calculationHistory = [];
    renderSummary();
}

document.getElementById("cardName").addEventListener("focus", renderCardSuggestions);
document.getElementById("cardName").addEventListener("click", renderCardSuggestions);

document.getElementById("cardName").addEventListener("input", function() {
    const cardName = document.getElementById("cardName").value.trim();

    if (cardName === "") {
        document.getElementById("category").value = "";
        document.getElementById("currentLevel").value = "";
    } else {
        autoFillRarity();
    }

    renderCardSuggestions();
});

document.getElementById("cardName").addEventListener("keydown", function(event) {
    const menu = document.getElementById("cardSuggestions");
    const menuIsOpen = menu.classList.contains("show");

    if (event.key === "ArrowDown") {
        event.preventDefault();

        if (!menuIsOpen) {
            renderCardSuggestions();
        }

        if (currentCardSuggestions.length > 0) {
            setActiveSuggestion(activeSuggestionIndex + 1);
        }

        return;
    }

    if (event.key === "ArrowUp") {
        event.preventDefault();

        if (!menuIsOpen) {
            renderCardSuggestions();
        }

        if (currentCardSuggestions.length > 0) {
            setActiveSuggestion(activeSuggestionIndex - 1);
        }

        return;
    }

    if (event.key === "Enter") {
        if (menuIsOpen && activeSuggestionIndex >= 0) {
            event.preventDefault();
            chooseCard(currentCardSuggestions[activeSuggestionIndex]);
            return;
        }

        if (formIsReadyForCalculation()) {
            event.preventDefault();
            calculateCards();
        }

        return;
    }

    if (event.key === "Escape") {
        hideCardSuggestions();
    }
});

    if (cardName === "") {
        document.getElementById("category").value = "";
        document.getElementById("currentLevel").value = "";
    } else {
        autoFillRarity();
    }

    renderCardSuggestions();
});

document.getElementById("category").addEventListener("change", filterCardsByRarity);
document.getElementById("category").addEventListener("keydown", function(event) {
    if (event.key === "Enter" && formIsReadyForCalculation()) {
        event.preventDefault();
        calculateCards();
    }
});

[
    "currentLevel",
    "desiredLevel",
    "ownedCards",
    "tradeTokens",
    "wildCards"
].forEach(fieldId => {
    document.getElementById(fieldId).addEventListener("keydown", function(event) {
        if (event.key === "Enter" && formIsReadyForCalculation()) {
            event.preventDefault();
            calculateCards();
        }
    });
});
document.addEventListener("click", function(event) {
    const cardField = document.getElementById("cardName");
    const menu = document.getElementById("cardSuggestions");

    if (!cardField.contains(event.target) && !menu.contains(event.target)) {
        hideCardSuggestions();
    }
});
</script>
